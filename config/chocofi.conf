# Sleep after 10 minutes of inactivity
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# Increase BT transmission strength
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Keyboard name shown during BT pairing
CONFIG_ZMK_KEYBOARD_NAME="Chocofi"

# ZMK Studio locking disabled for easier access
CONFIG_ZMK_STUDIO_LOCKING=n

# nice!view: invert colors (white background, black text)
CONFIG_NICE_VIEW_WIDGET_INVERTED=y
